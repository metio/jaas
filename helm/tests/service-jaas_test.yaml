suite: test jaas service
templates:
  - service-jaas.yaml
tests:
  - it: is named jaas
    asserts:
      - equal:
          path: metadata.name
          value: jaas
  - it: lives in the release namespace
    release:
      namespace: my-ns
    asserts:
      - equal:
          path: metadata.namespace
          value: my-ns
  - it: carries the standard Kubernetes app labels
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: jaas
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: jaas
      - equal:
          path: metadata.labels["app.kubernetes.io/part-of"]
          value: jaas
      - exists:
          path: metadata.labels["app.kubernetes.io/managed-by"]
      - exists:
          path: metadata.labels["helm.sh/chart"]
  - it: exposes the configured http port
    set:
      ports:
        http: 9090
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 9090
      - equal:
          path: spec.ports[0].name
          value: http
  - it: uses the default http port 8080
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 8080
  - it: selector includes the expected stable labels only
    asserts:
      - equal:
          path: spec.selector["app.kubernetes.io/name"]
          value: jaas
      - equal:
          path: spec.selector["app.kubernetes.io/component"]
          value: jaas
      - equal:
          path: spec.selector["app.kubernetes.io/part-of"]
          value: jaas
      - exists:
          path: spec.selector["app.kubernetes.io/instance"]
  - it: selector deliberately omits managed-by
    asserts:
      - notExists:
          path: spec.selector["app.kubernetes.io/managed-by"]
  - it: omits ipFamilyPolicy when unset (default)
    asserts:
      - notExists:
          path: spec.ipFamilyPolicy
  - it: sets ipFamilyPolicy when configured
    set:
      service:
        ipFamilyPolicy: PreferDualStack
    asserts:
      - equal:
          path: spec.ipFamilyPolicy
          value: PreferDualStack
