suite: test jaas horizontalpodautoscaler
templates:
  - horizontalpodautoscaler-jaas.yaml
tests:
  - it: is not rendered at defaults (max=min=1)
    asserts:
      - hasDocuments:
          count: 0
  - it: is not rendered when max equals min above 1
    set:
      replicas:
        min: 3
        max: 3
    asserts:
      - hasDocuments:
          count: 0
  - it: is rendered when max > min
    set:
      replicas:
        min: 1
        max: 5
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: HorizontalPodAutoscaler
  - it: is named jaas
    set:
      replicas:
        min: 1
        max: 5
    asserts:
      - equal:
          path: metadata.name
          value: jaas
  - it: lives in the release namespace
    release:
      namespace: my-ns
    set:
      replicas:
        min: 1
        max: 5
    asserts:
      - equal:
          path: metadata.namespace
          value: my-ns
  - it: carries the standard Kubernetes app labels
    set:
      replicas:
        min: 1
        max: 5
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: jaas
      - exists:
          path: metadata.labels["app.kubernetes.io/managed-by"]
      - exists:
          path: metadata.labels["helm.sh/chart"]
  - it: reflects replicas.min and replicas.max in spec
    set:
      replicas:
        min: 2
        max: 10
    asserts:
      - equal:
          path: spec.minReplicas
          value: 2
      - equal:
          path: spec.maxReplicas
          value: 10
  - it: targets the jaas Deployment
    set:
      replicas:
        min: 1
        max: 5
    asserts:
      - equal:
          path: spec.scaleTargetRef.apiVersion
          value: apps/v1
      - equal:
          path: spec.scaleTargetRef.kind
          value: Deployment
      - equal:
          path: spec.scaleTargetRef.name
          value: jaas
  - it: configures CPU utilization metric at 75%
    set:
      replicas:
        min: 1
        max: 5
    asserts:
      - equal:
          path: spec.metrics[0].type
          value: Resource
      - equal:
          path: spec.metrics[0].resource.name
          value: cpu
      - equal:
          path: spec.metrics[0].resource.target.type
          value: Utilization
      - equal:
          path: spec.metrics[0].resource.target.averageUtilization
          value: 75
  - it: configures memory utilization metric at 75%
    set:
      replicas:
        min: 1
        max: 5
    asserts:
      - equal:
          path: spec.metrics[1].type
          value: Resource
      - equal:
          path: spec.metrics[1].resource.name
          value: memory
      - equal:
          path: spec.metrics[1].resource.target.type
          value: Utilization
      - equal:
          path: spec.metrics[1].resource.target.averageUtilization
          value: 75
