suite: test jaas poddisruptionbudget
templates:
  - poddisruptionbudget-jaas.yaml
tests:
  - it: is not rendered at defaults (max=min=1)
    asserts:
      - hasDocuments:
          count: 0
  - it: is not rendered when max equals min above 1
    set:
      replicas:
        min: 3
        max: 3
    asserts:
      - hasDocuments:
          count: 0
  - it: is rendered when max > min
    set:
      replicas:
        min: 1
        max: 3
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: PodDisruptionBudget
  - it: is named jaas
    set:
      replicas:
        min: 1
        max: 3
    asserts:
      - equal:
          path: metadata.name
          value: jaas
  - it: lives in the release namespace
    release:
      namespace: my-ns
    set:
      replicas:
        min: 1
        max: 3
    asserts:
      - equal:
          path: metadata.namespace
          value: my-ns
  - it: carries the standard Kubernetes app labels
    set:
      replicas:
        min: 1
        max: 3
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: jaas
      - exists:
          path: metadata.labels["app.kubernetes.io/managed-by"]
      - exists:
          path: metadata.labels["helm.sh/chart"]
  - it: selector includes the expected stable labels only
    set:
      replicas:
        min: 1
        max: 3
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: jaas
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: jaas
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/part-of"]
          value: jaas
      - exists:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
  - it: selector deliberately omits managed-by
    set:
      replicas:
        min: 1
        max: 3
    asserts:
      - notExists:
          path: spec.selector.matchLabels["app.kubernetes.io/managed-by"]
  - it: minAvailable=0 when min < 2
    set:
      replicas:
        min: 1
        max: 3
    asserts:
      - equal:
          path: spec.minAvailable
          value: 0
  - it: minAvailable=1 when min >= 2
    set:
      replicas:
        min: 2
        max: 5
    asserts:
      - equal:
          path: spec.minAvailable
          value: 1
  - it: omits unhealthyPodEvictionPolicy when unset (default)
    set:
      replicas:
        min: 1
        max: 3
    asserts:
      - notExists:
          path: spec.unhealthyPodEvictionPolicy
  - it: sets unhealthyPodEvictionPolicy when configured
    set:
      replicas:
        min: 1
        max: 3
      pdb:
        unhealthyPodEvictionPolicy: AlwaysAllow
    asserts:
      - equal:
          path: spec.unhealthyPodEvictionPolicy
          value: AlwaysAllow
