suite: test jaas deployment
templates:
  - deployment-jaas.yaml
tests:
  # ------------------------------------------------------------------
  # Snapshots — large structural assertions kept from the original suite.
  # ------------------------------------------------------------------
  - it: matches its volumes snapshot
    documentSelector:
      path: metadata.name
      value: jaas
    asserts:
      - isKind:
          of: Deployment
      - matchSnapshot:
          path: spec.template.spec.volumes
  - it: matches its volume mounts snapshot
    documentSelector:
      path: metadata.name
      value: jaas
      skipEmptyTemplates: true
    asserts:
      - isKind:
          of: Deployment
      - matchSnapshot:
          path: spec.template.spec.containers[0].volumeMounts
  - it: matches its security context snapshot
    documentSelector:
      path: metadata.name
      value: jaas
      skipEmptyTemplates: true
    asserts:
      - isKind:
          of: Deployment
      - matchSnapshot:
          path: spec.template.spec.containers[0].securityContext
  - it: matches its arguments snapshot
    documentSelector:
      path: metadata.name
      value: jaas
      skipEmptyTemplates: true
    asserts:
      - isKind:
          of: Deployment
      - matchSnapshot:
          path: spec.template.spec.containers[0].args
  - it: supports private pull secrets
    set:
      imagePullSecrets:
        - name: something
    documentSelector:
      path: metadata.name
      value: jaas
      skipEmptyTemplates: true
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: something
  - it: supports additional env variables
    set:
      externalVariables:
        some: value
        other: thing
    documentSelector:
      path: metadata.name
      value: jaas
      skipEmptyTemplates: true
    asserts:
      - isKind:
          of: Deployment
      - matchSnapshot:
          path: spec.template.spec.containers[0].env
  - it: supports loading env variables from config maps and secrets
    set:
      externalVariablesFrom:
        configMaps:
          - some-config-map
        secrets:
          - some-secret
    documentSelector:
      path: metadata.name
      value: jaas
      skipEmptyTemplates: true
    asserts:
      - isKind:
          of: Deployment
      - matchSnapshot:
          path: spec.template.spec.containers[0].envFrom

  # ------------------------------------------------------------------
  # Metadata & top-level spec
  # ------------------------------------------------------------------
  - it: is named jaas
    asserts:
      - equal:
          path: metadata.name
          value: jaas
  - it: lives in the release namespace
    release:
      namespace: my-ns
    asserts:
      - equal:
          path: metadata.namespace
          value: my-ns
  - it: carries the standard Kubernetes app labels
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: jaas
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: jaas
      - equal:
          path: metadata.labels["app.kubernetes.io/part-of"]
          value: jaas
      - exists:
          path: metadata.labels["app.kubernetes.io/managed-by"]
      - exists:
          path: metadata.labels["app.kubernetes.io/version"]
      - exists:
          path: metadata.labels["helm.sh/chart"]
  - it: merges deployment.additionalLabels into the deployment metadata
    set:
      deployment:
        additionalLabels:
          team: platform
          tier: prod
    asserts:
      - equal:
          path: metadata.labels.team
          value: platform
      - equal:
          path: metadata.labels.tier
          value: prod
  - it: respects deployment.revisionHistoryLimit
    set:
      deployment:
        revisionHistoryLimit: 7
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 7
  - it: defaults revisionHistoryLimit to 1
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 1
  - it: does not set spec.replicas (HPA manages scale)
    asserts:
      - notExists:
          path: spec.replicas

  # ------------------------------------------------------------------
  # Selector — must not include managed-by, because spec.selector is immutable
  # and managed-by can change across install tools (Helm, Helmfile, ArgoCD).
  # ------------------------------------------------------------------
  - it: selector includes the expected stable labels only
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: jaas
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: jaas
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/part-of"]
          value: jaas
      - exists:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
  - it: selector deliberately omits managed-by
    asserts:
      - notExists:
          path: spec.selector.matchLabels["app.kubernetes.io/managed-by"]

  # ------------------------------------------------------------------
  # Pod template metadata
  # ------------------------------------------------------------------
  - it: merges pod.additionalLabels into the pod template metadata
    set:
      pod:
        additionalLabels:
          monitoring: enabled
    asserts:
      - equal:
          path: spec.template.metadata.labels.monitoring
          value: enabled

  # ------------------------------------------------------------------
  # Image
  # ------------------------------------------------------------------
  - it: composes the container image from registry, repository, and appVersion
    set:
      image:
        registry: example.com
        repository: my-org/my-jaas
    chart:
      appVersion: 9.9.9
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: example.com/my-org/my-jaas:9.9.9
  - it: uses dockerhub defaults
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^docker\\.io/metio/jaas:"

  # ------------------------------------------------------------------
  # Container ports
  # ------------------------------------------------------------------
  - it: exposes the configured http port
    set:
      ports:
        http: 9090
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 9090
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: http
  - it: exposes the configured management port
    set:
      ports:
        management: 9091
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[1].containerPort
          value: 9091
      - equal:
          path: spec.template.spec.containers[0].ports[1].name
          value: management

  # ------------------------------------------------------------------
  # Container args
  # ------------------------------------------------------------------
  - it: passes ports.http via -port
    set:
      ports:
        http: 9090
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: -port=9090
  - it: passes ports.management via -management-port
    set:
      ports:
        management: 9091
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: -management-port=9091
  - it: passes arguments.logLevel via -log-level
    set:
      arguments:
        logLevel: debug
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: -log-level=debug
  - it: passes paths.snippets via -snippet-directory
    set:
      paths:
        snippets: /custom/snippets
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: -snippet-directory=/custom/snippets
  - it: passes the default arguments.readTimeout via -read-timeout
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: -read-timeout=10s
  - it: passes a custom arguments.readTimeout via -read-timeout
    set:
      arguments:
        readTimeout: 30s
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: -read-timeout=30s
  - it: passes the default arguments.writeTimeout via -write-timeout
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: -write-timeout=10s
  - it: passes a custom arguments.writeTimeout via -write-timeout
    set:
      arguments:
        writeTimeout: 45s
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: -write-timeout=45s
  - it: passes the default arguments.managementReadTimeout via -management-read-timeout
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: -management-read-timeout=10s
  - it: passes a custom arguments.managementReadTimeout via -management-read-timeout
    set:
      arguments:
        managementReadTimeout: 5s
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: -management-read-timeout=5s
  - it: passes the default arguments.managementWriteTimeout via -management-write-timeout
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: -management-write-timeout=10s
  - it: passes a custom arguments.managementWriteTimeout via -management-write-timeout
    set:
      arguments:
        managementWriteTimeout: 15s
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: -management-write-timeout=15s
  - it: passes the default arguments.jsonnetEndpointPath via -jsonnet-endpoint-path
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: -jsonnet-endpoint-path=jsonnet
  - it: passes a custom arguments.jsonnetEndpointPath via -jsonnet-endpoint-path
    set:
      arguments:
        jsonnetEndpointPath: eval
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: -jsonnet-endpoint-path=eval
  - it: passes the default arguments.evaluationTimeout via -evaluation-timeout
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: -evaluation-timeout=5s
  - it: passes a custom arguments.evaluationTimeout via -evaluation-timeout
    set:
      arguments:
        evaluationTimeout: 30s
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: -evaluation-timeout=30s
  - it: passes the default arguments.maxStack via -max-stack
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: -max-stack=500
  - it: passes a custom arguments.maxStack via -max-stack
    set:
      arguments:
        maxStack: 2000
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: -max-stack=2000
  - it: accepts disabling the evaluation timeout (0)
    set:
      arguments:
        evaluationTimeout: 0s
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: -evaluation-timeout=0s
  - it: accepts disabling the max-stack limit (0)
    set:
      arguments:
        maxStack: 0
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: -max-stack=0
  - it: passes the default arguments.shutdownDelay via -shutdown-delay
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: -shutdown-delay=5s
  - it: passes a custom arguments.shutdownDelay via -shutdown-delay
    set:
      arguments:
        shutdownDelay: 20s
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: -shutdown-delay=20s
  - it: accepts disabling the shutdown delay (0)
    set:
      arguments:
        shutdownDelay: 0s
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: -shutdown-delay=0s

  # ------------------------------------------------------------------
  # Scheduling selectors must NOT include managed-by, but must still carry
  # the other expected stable labels — without those, the constraints would
  # match too little (or nothing) and stop influencing pod placement.
  # ------------------------------------------------------------------
  - it: podAntiAffinity labelSelector excludes managed-by
    asserts:
      - notExists:
          path: spec.template.spec.affinity.podAntiAffinity.preferredDuringSchedulingIgnoredDuringExecution[0].podAffinityTerm.labelSelector.matchLabels["app.kubernetes.io/managed-by"]
  - it: podAntiAffinity labelSelector retains name, component, and part-of
    asserts:
      - equal:
          path: spec.template.spec.affinity.podAntiAffinity.preferredDuringSchedulingIgnoredDuringExecution[0].podAffinityTerm.labelSelector.matchLabels["app.kubernetes.io/name"]
          value: jaas
      - equal:
          path: spec.template.spec.affinity.podAntiAffinity.preferredDuringSchedulingIgnoredDuringExecution[0].podAffinityTerm.labelSelector.matchLabels["app.kubernetes.io/component"]
          value: jaas
      - equal:
          path: spec.template.spec.affinity.podAntiAffinity.preferredDuringSchedulingIgnoredDuringExecution[0].podAffinityTerm.labelSelector.matchLabels["app.kubernetes.io/part-of"]
          value: jaas
  - it: topologySpreadConstraints labelSelector excludes managed-by
    asserts:
      - notExists:
          path: spec.template.spec.topologySpreadConstraints[0].labelSelector.matchLabels["app.kubernetes.io/managed-by"]
  - it: topologySpreadConstraints labelSelector retains the other expected labels
    asserts:
      - equal:
          path: spec.template.spec.topologySpreadConstraints[0].labelSelector.matchLabels["app.kubernetes.io/name"]
          value: jaas
      - equal:
          path: spec.template.spec.topologySpreadConstraints[0].labelSelector.matchLabels["app.kubernetes.io/component"]
          value: jaas
      - equal:
          path: spec.template.spec.topologySpreadConstraints[0].labelSelector.matchLabels["app.kubernetes.io/part-of"]
          value: jaas
      - exists:
          path: spec.template.spec.topologySpreadConstraints[0].labelSelector.matchLabels["app.kubernetes.io/instance"]
      - exists:
          path: spec.template.spec.topologySpreadConstraints[0].labelSelector.matchLabels["app.kubernetes.io/version"]
      - exists:
          path: spec.template.spec.topologySpreadConstraints[0].labelSelector.matchLabels["helm.sh/chart"]

  # ------------------------------------------------------------------
  # Resources
  # ------------------------------------------------------------------
  - it: applies resources to both requests and limits
    set:
      resources:
        cpu: 250m
        memory: 256Mi
        ephemeralStorage: 100Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 250m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 256Mi
      - equal:
          path: spec.template.spec.containers[0].resources.requests["ephemeral-storage"]
          value: 100Mi
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 250m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 256Mi
      - equal:
          path: spec.template.spec.containers[0].resources.limits["ephemeral-storage"]
          value: 100Mi

  # ------------------------------------------------------------------
  # Probes — wired against the management port
  # ------------------------------------------------------------------
  - it: wires startup probe at /start on the management port
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.path
          value: /start
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.port
          value: management
  - it: wires readiness probe at /ready
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /ready
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: management
  - it: wires liveness probe at /live
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /live
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: management

  # ------------------------------------------------------------------
  # Built-in libraries (grafonnet, docsonnet, xtd)
  # ------------------------------------------------------------------
  - it: includes grafonnet by default — arg, mount, and OCI volume
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: -library-path=/srv/libraries/grafonnet
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: library-grafonnet
            mountPath: /srv/libraries/grafonnet
            readOnly: true
  - it: disabling grafonnet removes its arg, mount and volume
    set:
      libraries:
        grafonnet:
          enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: -library-path=/srv/libraries/grafonnet
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: library-grafonnet
            mountPath: /srv/libraries/grafonnet
            readOnly: true
  - it: customizes grafonnet OCI coordinates via registry/repository/version
    set:
      libraries:
        grafonnet:
          enabled: true
          registry: example.com
          repository: org/grafonnet
          version: v99.0.0
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: library-grafonnet
            image:
              reference: example.com/org/grafonnet:v99.0.0
              pullPolicy: IfNotPresent
  - it: disabling docsonnet removes its arg, mount and volume
    set:
      libraries:
        docsonnet:
          enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: -library-path=/srv/libraries/docsonnet
  - it: disabling xtd removes its arg, mount and volume
    set:
      libraries:
        xtd:
          enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: -library-path=/srv/libraries/xtd

  # ------------------------------------------------------------------
  # additionalLibraries (operator-supplied OCI library images)
  # ------------------------------------------------------------------
  - it: adds a library-path arg per entry in additionalLibraries
    set:
      additionalLibraries:
        mylib: example.com/org/mylib:v1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: -library-path=/srv/libraries/mylib
  - it: adds a volume per entry in additionalLibraries
    set:
      additionalLibraries:
        mylib: example.com/org/mylib:v1
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: library-mylib
            image:
              reference: example.com/org/mylib:v1
              pullPolicy: IfNotPresent
  - it: adds a read-only volumeMount per entry in additionalLibraries
    set:
      additionalLibraries:
        mylib: example.com/org/mylib:v1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: library-mylib
            mountPath: /srv/libraries/mylib
            readOnly: true
  - it: substitutes underscores with dashes in the additionalLibraries volume name
    set:
      additionalLibraries:
        my_lib_name: example.com/org/mylib:v1
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: library-my-lib-name
            image:
              reference: example.com/org/mylib:v1
              pullPolicy: IfNotPresent
  - it: honours paths.libraries for the additionalLibraries mount path
    set:
      paths:
        libraries: /opt/libs
      additionalLibraries:
        mylib: example.com/org/mylib:v1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: library-mylib
            mountPath: /opt/libs/mylib
            readOnly: true

  # ------------------------------------------------------------------
  # snippets (operator-supplied OCI snippet images)
  # ------------------------------------------------------------------
  - it: adds a volume per entry in snippets
    set:
      snippets:
        my-dash: example.com/org/dash:v1
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: snippet-my-dash
            image:
              reference: example.com/org/dash:v1
              pullPolicy: IfNotPresent
  - it: adds a read-only volumeMount per entry in snippets
    set:
      snippets:
        my-dash: example.com/org/dash:v1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: snippet-my-dash
            mountPath: /srv/snippets/my-dash
            readOnly: true
  - it: substitutes underscores with dashes in the snippet volume name
    set:
      snippets:
        my_dash: example.com/org/dash:v1
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: snippet-my-dash
            image:
              reference: example.com/org/dash:v1
              pullPolicy: IfNotPresent
  - it: honours paths.snippets for the snippet mount path
    set:
      paths:
        snippets: /opt/snippets
      snippets:
        my-dash: example.com/org/dash:v1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: snippet-my-dash
            mountPath: /opt/snippets/my-dash
            readOnly: true

  # ------------------------------------------------------------------
  # Pod security & scheduling invariants
  # ------------------------------------------------------------------
  - it: refuses automountServiceAccountToken
    asserts:
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: false
  - it: prefers anti-affinity against other instances of the same chart
    asserts:
      - exists:
          path: spec.template.spec.affinity.podAntiAffinity
  - it: spreads pods across hosts via topologySpreadConstraints
    asserts:
      - equal:
          path: spec.template.spec.topologySpreadConstraints[0].topologyKey
          value: kubernetes.io/hostname
      - equal:
          path: spec.template.spec.topologySpreadConstraints[0].whenUnsatisfiable
          value: ScheduleAnyway
