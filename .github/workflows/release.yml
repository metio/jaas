name: Automated Release
on:
  schedule:
    - cron: 47 7 * * MON
  workflow_dispatch:
jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      commit_count: ${{ steps.commits.outputs.count }}
      release_version: ${{ steps.release.outputs.version }}
      previous_version: ${{ steps.last_release.outputs.tag }}
    steps:
      - id: checkout
        name: Clone Git Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: last_release
        name: Fetch last release info
        run: echo "tag=$(gh release view --json tagName --jq '.tagName')" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - id: commits
        name: Count Commits
        run: echo "count=$(git rev-list --count ${{ steps.last_release.outputs.tag }}..HEAD -- go.mod main.go internal api config Dockerfile)" >> $GITHUB_OUTPUT
      - id: release
        name: Create Release Version
        if: steps.commits.outputs.count > 0 || steps.last_release.outputs.tag == ''
        run: echo "version=$(date +'%Y.%-m.%-d')" >> $GITHUB_OUTPUT
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - id: checkout
        name: Clone Git Repository
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        uses: actions/checkout@v6
      - id: setup_go
        name: Set up Go
        uses: actions/setup-go@v6
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        with:
          go-version-file: go.mod
          cache: true
      - id: build
        name: Build Project
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        run: >
          go build
          -o ${{ github.event.repository.name }}_v${{ needs.prepare.outputs.release_version }}
          -trimpath
          -ldflags="-s -w -X main.version=${{ needs.prepare.outputs.release_version }} -X main.commit=${{ github.sha }}"
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
      - id: tar
        name: Create tar.gz Archive
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        run: >
          tar
          --create
          --gzip
          --file ${{ github.event.repository.name }}_${{ needs.prepare.outputs.release_version }}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
          ${{ github.event.repository.name }}_v${{ needs.prepare.outputs.release_version }}
          LICENSE
          README.md
      - id: upload
        name: Upload Artifact
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ github.event.repository.name }}_${{ needs.prepare.outputs.release_version }}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
  github:
    name: GitHub Release
    # Gate the release on a green image build too: the release notes advertise
    # ghcr.io/metio/jaas:<version>, so that tag must exist before the release is
    # published. `build` supplies the attached binaries/checksums; `container`
    # serializes the release after the image build+push+sign (job order in this
    # file is irrelevant — `needs` drives execution), so a failed build skips
    # the release instead of leaving a published release that points at a
    # non-existent image. The cost is a longer wall-clock release; the benefit
    # is no dangling releases.
    needs: [prepare, build, container]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - id: checkout
        name: Clone Git Repository
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: download
        name: Download Artifacts
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: ${{ github.event.repository.name }}-*
          merge-multiple: true
      - id: checksums
        name: Calculate Checksums
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        run: >
          cd dist &&
          sha256sum
          ${{ github.event.repository.name }}_${{ needs.prepare.outputs.release_version }}_linux_amd64.tar.gz
          ${{ github.event.repository.name }}_${{ needs.prepare.outputs.release_version }}_linux_arm.tar.gz
          ${{ github.event.repository.name }}_${{ needs.prepare.outputs.release_version }}_linux_arm64.tar.gz
          ${{ github.event.repository.name }}_${{ needs.prepare.outputs.release_version }}_darwin_amd64.tar.gz
          ${{ github.event.repository.name }}_${{ needs.prepare.outputs.release_version }}_darwin_arm64.tar.gz
          ${{ github.event.repository.name }}_${{ needs.prepare.outputs.release_version }}_windows_amd64.tar.gz
          > ${{ github.event.repository.name }}_${{ needs.prepare.outputs.release_version }}_SHA256SUMS
      - id: import_gpg
        name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v7
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        with:
          gpg_private_key: ${{ secrets.GPG_SECRET_KEY_BASE64 }}
          passphrase: ${{ secrets.GPG_SECRET_KEY_PASSWORD }}
      - id: sign_checksums
        name: Sign Checksums
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        run: >
          gpg
          --batch
          --local-user ${{ steps.import_gpg.outputs.fingerprint }}
          --output dist/${{ github.event.repository.name }}_${{ needs.prepare.outputs.release_version }}_SHA256SUMS.sig
          --detach-sign
          dist/${{ github.event.repository.name }}_${{ needs.prepare.outputs.release_version }}_SHA256SUMS
      - id: create_release
        name: Create Release
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.release_version }}
          name: ${{ needs.prepare.outputs.release_version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
          body: |
            ## Usage

            Pull latest container from `ghcr.io/metio/jaas:${{ needs.prepare.outputs.release_version }}`. Check the [migration guide](https://github.com/metio/jaas/blob/main/MIGRATIONS.md) for any required actions on your part.
          generate_release_notes: true
          files: |
            dist/${{ github.event.repository.name }}_${{ needs.prepare.outputs.release_version }}_linux_amd64.tar.gz
            dist/${{ github.event.repository.name }}_${{ needs.prepare.outputs.release_version }}_linux_arm.tar.gz
            dist/${{ github.event.repository.name }}_${{ needs.prepare.outputs.release_version }}_linux_arm64.tar.gz
            dist/${{ github.event.repository.name }}_${{ needs.prepare.outputs.release_version }}_darwin_amd64.tar.gz
            dist/${{ github.event.repository.name }}_${{ needs.prepare.outputs.release_version }}_darwin_arm64.tar.gz
            dist/${{ github.event.repository.name }}_${{ needs.prepare.outputs.release_version }}_windows_amd64.tar.gz
            dist/${{ github.event.repository.name }}_${{ needs.prepare.outputs.release_version }}_SHA256SUMS
            dist/${{ github.event.repository.name }}_${{ needs.prepare.outputs.release_version }}_SHA256SUMS.sig
  container:
    name: Container Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - id: checkout
        name: Clone Git Repository
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        uses: actions/checkout@v6
      - id: cosign-install
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - id: buildx
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - id: registry_login
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: timestamp
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        name: Create Timestamp
        run: echo "date=$(date --rfc-3339=seconds)" >> $GITHUB_OUTPUT
      - id: publish
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        name: Publish Image
        uses: docker/build-push-action@v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: ./Dockerfile
          push: true
          # Same arch set every metio image ships. The Dockerfile cross-compiles
          # via Go (builder pinned to $BUILDPLATFORM), so no QEMU is needed.
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/ppc64le,linux/riscv64,linux/s390x
          build-args: |
            VERSION=${{ needs.prepare.outputs.release_version }}
            COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/metio/jaas:latest
            ghcr.io/metio/jaas:${{ needs.prepare.outputs.release_version }}
          labels: |
            org.opencontainers.image.title=jaas
            org.opencontainers.image.licenses=0BSD
            org.opencontainers.image.vendor=metio
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.release_version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.timestamp.outputs.date }}
          cache-from: type=registry,ref=ghcr.io/metio/jaas:buildcache
          cache-to: type=registry,ref=ghcr.io/metio/jaas:buildcache,mode=max
          sbom: true
          provenance: true
      - id: sign_image
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        name: Sign Image
        run: |
          cosign sign \
            --yes \
            --annotations "repo=${{ github.repository }}" \
            --annotations "workflow=${{ github.workflow }}" \
            --annotations "ref=${{ github.sha }}" \
            ghcr.io/metio/jaas@${{ steps.publish.outputs.digest }}
