name: Verify Commits
on:
  pull_request:
    branches: [ main ]
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v6
      - id: setup_go
        name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - id: lint
        name: Lint Go Code
        run: go vet ./...
      - id: tests
        name: Run Tests
        run: go test -v -cover ./...
      - id: buildx
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - id: container_image
        name: Build Image
        uses: docker/build-push-action@v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: ./Dockerfile
          push: false
          tags: |
            docker.io/metio/jaas:${{ github.sha }}
      - id: helm_unittest
        name: Test Helm Chart
        uses: d3adb5/helm-unittest-action@v2
        with:
          charts: helm
          helm-version: v3.21.0  # see https://github.com/d3adb5/helm-unittest-action/issues/23
          unittest-version: v1.0.3  # see https://github.com/helm-unittest/helm-unittest/issues/856
          install-mode: if-not-present
          github-token: ${{ secrets.GITHUB_TOKEN }}
