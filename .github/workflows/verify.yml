name: Verify Commits
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - id: setup_go
        name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - id: lint
        name: Lint Go Code
        run: go vet ./...
      - id: staticcheck
        name: Staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...
      - id: gofumpt
        name: Check formatting (gofumpt)
        run: |
          go install mvdan.cc/gofumpt@latest
          unformatted="$(gofumpt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofumpt-formatted:"
            echo "$unformatted"
            exit 1
          fi
      - id: gosec
        name: Security scan (gosec)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...
      - id: arch_go
        name: Architecture rules (arch-go)
        run: |
          go install github.com/arch-go/arch-go@latest
          arch-go
      - id: govulncheck
        name: Vulnerability scan (Go modules)
        # Hard gate: a reachable-from-code advisory blocks merge.
        # Resolution is usually a bump of the `toolchain` directive in
        # go.mod (for stdlib advisories) or `go get -u` (for deps).
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - id: tests
        name: Run Tests
        run: go test -v -cover ./...
      - id: buildx
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - id: container_image
        name: Build Image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: |
            ghcr.io/metio/jaas:${{ github.sha }}
      - id: trivy_scan
        name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/metio/jaas:${{ github.sha }}
          format: table
          # Fail the build on any Critical/High finding. The distroless
          # base is kept slim and patched; new findings should be rare
          # and worth investigating before merge.
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
  yaml:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Lint YAML (yamllint)
        run: pipx install yamllint && yamllint .
  github-actions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Lint workflows (actionlint)
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1
  markdown:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Lint Markdown (markdownlint)
        uses: DavidAnson/markdownlint-cli2-action@992badcdf24e3b8eb7e87ff9287fe931bcb00c6e # v20
        with:
          globs: "**/*.md"
  typos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Spell check (typos)
        uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # v1
