name: Kind smoke test
on:
  # Runs on every PR (no paths filter) so the `all-green` aggregate always
  # reports a status and can be a required check. The expensive kind jobs are
  # gated internally on `discover.outputs.relevant` (did this PR touch operator
  # code / smoke scripts?), so cost stays the same as the old paths filter.
  pull_request:
    branches: [main]
  workflow_dispatch:

# Angle 1 of the two-angle e2e strategy: the DEV jaas binary (HEAD build) tested
# against the LATEST RELEASED chart (oci://ghcr.io/metio/helm-charts/jaas). The
# companion angle — dev chart × released binary — lives in the helm-charts repo
# and runs THE SAME operator scenarios (the shared hack/smoke/*.sh scripts,
# checked out from this repo at the released tag). Deploying jaas is the only
# part that differs between angles; the scenario logic exists once, here.
#
# Bootstrap: until metio/helm-charts cuts its first `jaas-*` chart release there
# is nothing to test against, so `discover` emits an empty version and every
# smoke job skips (green). They activate automatically once a chart is released.
#
# Versions: the `discover` job finds the newest Kubernetes (kindest/node) and
# Flux releases at runtime — nothing is hardcoded, so new releases are tested
# automatically and a regression against one surfaces as a failure. The `smoke`
# job sweeps the full k8s × Flux matrix; the other jobs run once on the newest of
# each because their concern (webhook cert mode, new CR fields, sourceRef
# chaining, fan-out throughput) is orthogonal to those versions. Flux is floored
# at v2.7.0, where the ExternalArtifact CRD lands. fail-fast is off so one bad
# combo doesn't mask others.

permissions:
  contents: read

jobs:
  discover:
    name: Discover chart + test versions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      chart_version: ${{ steps.find.outputs.version }}
      k8s_versions: ${{ steps.versions.outputs.k8s }}
      flux_versions: ${{ steps.versions.outputs.flux }}
      k8s_latest: ${{ steps.versions.outputs.k8s_latest }}
      flux_latest: ${{ steps.versions.outputs.flux_latest }}
      kind_latest: ${{ steps.versions.outputs.kind_latest }}
      relevant: ${{ steps.scope.outputs.relevant }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - id: scope
        name: Did this PR touch operator code, dependencies, or smoke scripts?
        env:
          # Attacker-influenced event data must reach the shell via env:, not
          # via ${{ }} expansion inside run:.
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          # Replaces the old `paths:` trigger: the heavy kind jobs run only when
          # something they exercise changed. go.mod/go.sum count because a
          # dependency bump (controller-runtime, the fluxcd source libraries,
          # minio-go, apimachinery) can change operator runtime behavior the e2e
          # is uniquely placed to catch. workflow_dispatch always counts.
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          base="$BASE_SHA"
          if git diff --name-only "$base" HEAD | grep -qE \
               '^(api|config)/|^internal/(operator|storage|sources|webhook)/|^main\.go$|^Dockerfile$|^hack/smoke/|^\.github/workflows/kind-smoke\.yml$|^go\.(mod|sum)$'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No operator/smoke changes in this PR — kind jobs skip (gate stays green)."
          fi
      - id: find
        name: Find newest jaas chart release in metio/helm-charts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The helm-charts release pipeline tags each chart release
          # `<chart>-<version>`; releases sort newest-first.
          tag="$(gh release list --repo metio/helm-charts --limit 100 \
                  --json tagName \
                  --jq '[.[] | select(.tagName | startswith("jaas-")) | .tagName] | .[0] // ""' 2>/dev/null || true)"
          v="${tag#jaas-}"
          if [ -z "$v" ]; then
            echo "::notice::No released jaas chart yet (metio/helm-charts has no jaas-* release); smoke jobs skip until the first release."
          else
            echo "latest released chart version: $v"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - id: versions
        name: Discover newest Kubernetes + Flux versions to test against
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          # Newest 4 kindest/node minors, latest patch each. New k8s releases are
          # tested automatically; if kind can't run a brand-new minor yet, that
          # surfaces as a failure — the signal to bump kind, not silent staleness.
          k8s=$(curl -fsSL "https://hub.docker.com/v2/repositories/kindest/node/tags?page_size=100" \
            | jq -r '.results[].name' | grep -E '^v1\.[0-9]+\.[0-9]+$' \
            | awk -F. '{print $1"."$2" "$0}' | sort -k1,1V -k2,2V \
            | awk '{l[$1]=$2} END{for(m in l)print l[m]}' | sort -V | tail -4 \
            | jq -R . | jq -cs . 2>/dev/null || echo '[]')
          [ "$(jq 'length' <<<"$k8s" 2>/dev/null || echo 0)" -gt 0 ] || k8s='["v1.33.1"]'
          # Newest 3 Flux minors at or above the ExternalArtifact floor (v2.7.0 /
          # source-controller v1.7.0); below that the publish path has no CRD. The
          # major>2 clause keeps a future v3.x in range without a manual edit.
          flux=$(gh release list --repo fluxcd/flux2 --limit 60 --json tagName,isPrerelease \
                   --jq '.[] | select(.isPrerelease==false) | .tagName' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | awk -F. '{m=$1;sub(/^v/,"",m); if(m>2||(m==2&&$2>=7))print}' \
            | awk -F. '{print $1"."$2" "$0}' | sort -k1,1V -k2,2V \
            | awk '{l[$1]=$2} END{for(m in l)print l[m]}' | sort -V | tail -3 \
            | jq -R . | jq -cs . 2>/dev/null || echo '[]')
          [ "$(jq 'length' <<<"$flux" 2>/dev/null || echo 0)" -gt 0 ] || flux='["v2.7.0"]'
          # Newest kind release — the pinned helm/kind-action's bundled kind can
          # lag new node images ("unknown containerd config version: N"); pin the
          # binary to the node image. Empty falls back to the action default.
          kind=$(gh release list --repo kubernetes-sigs/kind --limit 30 \
                   --json tagName,isPrerelease \
                   --jq '.[] | select(.isPrerelease==false) | .tagName' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
          {
            echo "k8s=$k8s"
            echo "flux=$flux"
            echo "k8s_latest=$(jq -r '.[-1]' <<<"$k8s")"
            echo "flux_latest=$(jq -r '.[-1]' <<<"$flux")"
            echo "kind_latest=$kind"
          } >> "$GITHUB_OUTPUT"
          echo "k8s=$k8s  flux=$flux  kind_latest=$kind"

  smoke:
    name: ${{ matrix.k8s_version }} / Flux ${{ matrix.flux_version }}
    needs: discover
    if: needs.discover.outputs.chart_version != '' && needs.discover.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      # Swept across the newest Kubernetes × Flux versions the discover job
      # found — no hardcoded versions, so a new k8s or Flux release is tested
      # automatically and a regression against it surfaces as a failure.
      matrix:
        k8s_version: ${{ fromJSON(needs.discover.outputs.k8s_versions) }}
        flux_version: ${{ fromJSON(needs.discover.outputs.flux_versions) }}
    steps:
      - name: Clone Git Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Build container image (dev / HEAD)
        run: docker build --build-arg VERSION=smoke --build-arg COMMIT=${{ github.sha }} -t jaas:smoke .
      - name: Create kind cluster (k8s ${{ matrix.k8s_version }})
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          version: ${{ needs.discover.outputs.kind_latest }}
          cluster_name: jaas-smoke
          node_image: kindest/node:${{ matrix.k8s_version }}
          wait: 180s
      - name: Load image into kind
        run: kind load docker-image jaas:smoke --name jaas-smoke
      - name: Cluster prereqs (cert-manager + Flux + issuer)
        run: |
          hack/smoke/setup-cert-manager.sh
          hack/smoke/setup-flux.sh ${{ matrix.flux_version }}
          hack/smoke/setup-selfsigned-issuer.sh
      - name: Install released chart with the dev image
        run: |
          # The chart's default JOI library image-volumes (volumes[].image) need
          # the ImageVolume feature gate, which kind does not enable by default —
          # without it the pod wedges in ContainerCreating. These scenarios use
          # inline files / a Bucket source, not the libraries, so disable them.
          helm upgrade --install jaas oci://ghcr.io/metio/helm-charts/jaas \
            --version "${{ needs.discover.outputs.chart_version }}" \
            --namespace jaas-system \
            --set image.registry=docker.io \
            --set image.repository=library/jaas \
            --set-string image.tag=smoke \
            --set operator.enabled=true \
            --set operator.defaultServiceAccount=default \
            --set libraries.grafonnet.enabled=false \
            --set libraries.docsonnet.enabled=false \
            --set libraries.xtd.enabled=false \
            --set operator.webhook.enabled=true \
            --set operator.webhook.certManager.issuerRef.kind=Issuer \
            --set operator.webhook.certManager.issuerRef.name=jaas-selfsigned \
            --wait --timeout 5m
          # The released chart's vendored CRDs lag HEAD; the dev binary must run
          # against its current schema, so overlay config/crd/bases.
          kubectl apply --server-side --force-conflicts -f config/crd/bases/
      - name: Operator scenario — basic (snippet → ExternalArtifact → fetch)
        run: hack/smoke/scenario-basic.sh
      - name: Uninstall hygiene — pre-delete hook drops finalizers
        run: |
          # The cleanup Job is a pre-delete hook; helm waits for it before
          # removing the operator. After uninstall both the snippet and its
          # ExternalArtifact must be gone — proving the finalizer ran end to end.
          helm uninstall jaas -n jaas-system --wait --timeout 5m
          if kubectl get jsonnetsnippet smoke 2>/dev/null; then echo "ERROR: snippet survived uninstall"; exit 1; fi
          if kubectl get externalartifact smoke 2>/dev/null; then echo "ERROR: ExternalArtifact survived uninstall"; exit 1; fi
          echo "Uninstall hygiene verified."
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl get nodes -o wide || true
          kubectl -n jaas-system get all || true
          kubectl -n jaas-system logs deploy/jaas --tail=300 || true
          kubectl -n flux-system logs deploy/source-controller --tail=300 || true
          kubectl describe jsonnetsnippet smoke || true
          kubectl describe externalartifact smoke || true
          kubectl get crd | grep -E "jaas|fluxcd" || true

  selfsigned:
    name: self-signed webhook (cert-manager-free)
    needs: discover
    if: needs.discover.outputs.chart_version != '' && needs.discover.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Clone Git Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Build container image (dev / HEAD)
        run: docker build --build-arg VERSION=smoke --build-arg COMMIT=${{ github.sha }} -t jaas:smoke .
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          version: ${{ needs.discover.outputs.kind_latest }}
          cluster_name: jaas-smoke-ss
          node_image: kindest/node:${{ needs.discover.outputs.k8s_latest }}
          wait: 180s
      - name: Load image into kind
        run: kind load docker-image jaas:smoke --name jaas-smoke-ss
      - name: Cluster prereqs (Flux)
        run: hack/smoke/setup-flux.sh ${{ needs.discover.outputs.flux_latest }}
      - name: Install released chart (self-signed cert mode) with the dev image
        run: |
          kubectl create namespace jaas-system
          # The chart's default JOI library image-volumes (volumes[].image) need
          # the ImageVolume feature gate, which kind does not enable by default —
          # without it the pod wedges in ContainerCreating. These scenarios use
          # inline files / a Bucket source, not the libraries, so disable them.
          helm upgrade --install jaas oci://ghcr.io/metio/helm-charts/jaas \
            --version "${{ needs.discover.outputs.chart_version }}" \
            --namespace jaas-system \
            --set image.registry=docker.io \
            --set image.repository=library/jaas \
            --set-string image.tag=smoke \
            --set operator.enabled=true \
            --set operator.defaultServiceAccount=default \
            --set libraries.grafonnet.enabled=false \
            --set libraries.docsonnet.enabled=false \
            --set libraries.xtd.enabled=false \
            --set operator.webhook.enabled=true \
            --set operator.webhook.certMode=self-signed \
            --set operator.webhook.selfSignedValidity=24h \
            --wait --timeout 5m
          kubectl apply --server-side --force-conflicts -f config/crd/bases/
      - name: Operator scenario — self-signed webhook
        run: hack/smoke/scenario-selfsigned-webhook.sh
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n jaas-system get all || true
          kubectl -n jaas-system logs deploy/jaas --tail=300 || true
          kubectl get validatingwebhookconfiguration jaas-jsonnetsnippet -o yaml || true
          kubectl describe jsonnetsnippet smoke-ss || true

  new-fields:
    name: spec.suspend + spec.history + Events
    needs: discover
    if: needs.discover.outputs.chart_version != '' && needs.discover.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Clone Git Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Build container image (dev / HEAD)
        run: docker build --build-arg VERSION=smoke --build-arg COMMIT=${{ github.sha }} -t jaas:smoke .
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          version: ${{ needs.discover.outputs.kind_latest }}
          cluster_name: jaas-fields
          node_image: kindest/node:${{ needs.discover.outputs.k8s_latest }}
          wait: 180s
      - name: Load image into kind
        run: kind load docker-image jaas:smoke --name jaas-fields
      - name: Cluster prereqs (Flux)
        run: hack/smoke/setup-flux.sh ${{ needs.discover.outputs.flux_latest }}
      - name: Install released chart (no webhook) with the dev image
        run: |
          kubectl create namespace jaas-system
          # The chart's default JOI library image-volumes (volumes[].image) need
          # the ImageVolume feature gate, which kind does not enable by default —
          # without it the pod wedges in ContainerCreating. These scenarios use
          # inline files / a Bucket source, not the libraries, so disable them.
          helm upgrade --install jaas oci://ghcr.io/metio/helm-charts/jaas \
            --version "${{ needs.discover.outputs.chart_version }}" \
            --namespace jaas-system \
            --set image.registry=docker.io \
            --set image.repository=library/jaas \
            --set-string image.tag=smoke \
            --set operator.enabled=true \
            --set operator.defaultServiceAccount=default \
            --set libraries.grafonnet.enabled=false \
            --set libraries.docsonnet.enabled=false \
            --set libraries.xtd.enabled=false \
            --wait --timeout 5m
          kubectl apply --server-side --force-conflicts -f config/crd/bases/
      - name: Operator scenario — new CR fields
        run: hack/smoke/scenario-fields.sh
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n jaas-system get all || true
          kubectl -n jaas-system logs deploy/jaas --tail=300 || true
          kubectl describe jsonnetsnippet fields-demo || true
          kubectl get events --field-selector involvedObject.name=fields-demo || true

  source-chain:
    name: sourceRef chain (Bucket → Snippet)
    needs: discover
    if: needs.discover.outputs.chart_version != '' && needs.discover.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Clone Git Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Build container image (dev / HEAD)
        run: docker build --build-arg VERSION=smoke --build-arg COMMIT=${{ github.sha }} -t jaas:smoke .
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          version: ${{ needs.discover.outputs.kind_latest }}
          cluster_name: jaas-chain
          node_image: kindest/node:${{ needs.discover.outputs.k8s_latest }}
          wait: 180s
      - name: Load image into kind
        run: kind load docker-image jaas:smoke --name jaas-chain
      - name: Cluster prereqs (Flux + SeaweedFS bucket)
        run: |
          hack/smoke/setup-flux.sh ${{ needs.discover.outputs.flux_latest }}
          hack/smoke/setup-seaweedfs.sh
      - name: Install released chart (no webhook) with the dev image
        run: |
          kubectl create namespace jaas-system
          # The chart's default JOI library image-volumes (volumes[].image) need
          # the ImageVolume feature gate, which kind does not enable by default —
          # without it the pod wedges in ContainerCreating. These scenarios use
          # inline files / a Bucket source, not the libraries, so disable them.
          helm upgrade --install jaas oci://ghcr.io/metio/helm-charts/jaas \
            --version "${{ needs.discover.outputs.chart_version }}" \
            --namespace jaas-system \
            --set image.registry=docker.io \
            --set image.repository=library/jaas \
            --set-string image.tag=smoke \
            --set operator.enabled=true \
            --set operator.defaultServiceAccount=default \
            --set libraries.grafonnet.enabled=false \
            --set libraries.docsonnet.enabled=false \
            --set libraries.xtd.enabled=false \
            --wait --timeout 5m
          kubectl apply --server-side --force-conflicts -f config/crd/bases/
      - name: Operator scenario — sourceRef chain
        run: hack/smoke/scenario-chain.sh
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n flux-system logs deploy/source-controller --tail=300 || true
          kubectl -n seaweedfs logs deploy/seaweedfs --tail=200 || true
          kubectl -n jaas-system logs deploy/jaas --tail=300 || true
          kubectl describe bucket dashboards || true
          kubectl describe jsonnetsnippet chain-demo || true
          kubectl describe externalartifact chain-demo || true

  scale-smoke:
    name: scale-smoke (N=50 snippets converge)
    needs: discover
    if: needs.discover.outputs.chart_version != '' && needs.discover.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Clone Git Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Build container image (dev / HEAD)
        run: docker build --build-arg VERSION=smoke --build-arg COMMIT=${{ github.sha }} -t jaas:smoke .
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          version: ${{ needs.discover.outputs.kind_latest }}
          cluster_name: jaas-scale
          node_image: kindest/node:${{ needs.discover.outputs.k8s_latest }}
          wait: 180s
      - name: Load image into kind
        run: kind load docker-image jaas:smoke --name jaas-scale
      - name: Cluster prereqs (Flux)
        run: hack/smoke/setup-flux.sh ${{ needs.discover.outputs.flux_latest }}
      - name: Install released chart (no webhook) with the dev image
        run: |
          kubectl create namespace jaas-system
          # The chart's default JOI library image-volumes (volumes[].image) need
          # the ImageVolume feature gate, which kind does not enable by default —
          # without it the pod wedges in ContainerCreating. These scenarios use
          # inline files / a Bucket source, not the libraries, so disable them.
          helm upgrade --install jaas oci://ghcr.io/metio/helm-charts/jaas \
            --version "${{ needs.discover.outputs.chart_version }}" \
            --namespace jaas-system \
            --set image.registry=docker.io \
            --set image.repository=library/jaas \
            --set-string image.tag=smoke \
            --set operator.enabled=true \
            --set operator.defaultServiceAccount=default \
            --set libraries.grafonnet.enabled=false \
            --set libraries.docsonnet.enabled=false \
            --set libraries.xtd.enabled=false \
            --wait --timeout 5m
          kubectl apply --server-side --force-conflicts -f config/crd/bases/
      - name: Operator scenario — scale (N=50 converge)
        run: hack/smoke/scenario-scale.sh
      - name: Sample the operator's metrics endpoint
        run: |
          kubectl -n jaas-system port-forward svc/jaas-metrics 8083:8083 &
          PF_PID=$!
          sleep 3
          curl -fsSL http://localhost:8083/metrics \
            | grep -E 'workqueue_depth|controller_runtime_reconcile_time|jaas_snippet_reconcile_total' \
            | head -20 || true
          kill $PF_PID || true
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n jaas-system get all || true
          kubectl -n jaas-system logs deploy/jaas --tail=500 || true
          kubectl get jsonnetsnippet -n default -o wide || true

  s3-seaweedfs:
    name: S3 storage backend (SeaweedFS — real SigV4 + multipart + SSE)
    needs: discover
    if: needs.discover.outputs.chart_version != '' && needs.discover.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Clone Git Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Build container image (dev / HEAD)
        run: docker build --build-arg VERSION=smoke --build-arg COMMIT=${{ github.sha }} -t jaas:smoke .
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          version: ${{ needs.discover.outputs.kind_latest }}
          cluster_name: jaas-seaweedfs
          node_image: kindest/node:${{ needs.discover.outputs.k8s_latest }}
          wait: 180s
      - name: Load image into kind
        run: kind load docker-image jaas:smoke --name jaas-seaweedfs
      - name: Cluster prereqs (Flux + SeaweedFS)
        run: |
          hack/smoke/setup-flux.sh ${{ needs.discover.outputs.flux_latest }}
          hack/smoke/setup-seaweedfs.sh
      - name: Install released chart (SeaweedFS backend, real creds) with the dev image
        run: |
          kubectl create namespace jaas-system
          # Real credentialed access: SeaweedFS validates SigV4, so anonymous is
          # off and the keys ride in via a credentials Secret (AWS_* keys) the
          # chart wires onto the pod with envFrom. This exercises real signing,
          # genuine multipart, and SeaweedFS's default server-side encryption —
          # the fidelity the in-memory S3Mock job can't provide.
          kubectl -n jaas-system create secret generic jaas-s3-creds \
            --from-literal=AWS_ACCESS_KEY_ID=jaas-smoke \
            --from-literal=AWS_SECRET_ACCESS_KEY=jaas-smoke-secret
          # The chart's JOI image-volumes need the ImageVolume feature gate kind
          # lacks, so disable them.
          helm upgrade --install jaas oci://ghcr.io/metio/helm-charts/jaas \
            --version "${{ needs.discover.outputs.chart_version }}" \
            --namespace jaas-system \
            --set image.registry=docker.io \
            --set image.repository=library/jaas \
            --set-string image.tag=smoke \
            --set operator.enabled=true \
            --set operator.defaultServiceAccount=default \
            --set libraries.grafonnet.enabled=false \
            --set libraries.docsonnet.enabled=false \
            --set libraries.xtd.enabled=false \
            --set operator.storage.backend=s3 \
            --set operator.storage.s3.endpoint=seaweedfs.seaweedfs.svc:8333 \
            --set operator.storage.s3.bucket=jaas-artifacts \
            --set operator.storage.s3.useSSL=false \
            --set operator.storage.s3.anonymous=false \
            --set operator.storage.s3.credentialsSecret.name=jaas-s3-creds \
            --wait --timeout 5m
          kubectl apply --server-side --force-conflicts -f config/crd/bases/
      - name: Operator scenario — S3 round-trip (SeaweedFS)
        run: NAME=seaweedfs-demo hack/smoke/scenario-s3.sh
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n jaas-system get all || true
          kubectl -n jaas-system logs deploy/jaas --tail=300 || true
          kubectl -n seaweedfs logs deploy/seaweedfs --tail=200 || true
          kubectl describe jsonnetsnippet seaweedfs-demo || true
          kubectl describe externalartifact seaweedfs-demo || true

  ha:
    name: HA (2 replicas, leader election failover)
    needs: discover
    if: needs.discover.outputs.chart_version != '' && needs.discover.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Clone Git Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Build container image (dev / HEAD)
        run: docker build --build-arg VERSION=smoke --build-arg COMMIT=${{ github.sha }} -t jaas:smoke .
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          version: ${{ needs.discover.outputs.kind_latest }}
          cluster_name: jaas-ha
          node_image: kindest/node:${{ needs.discover.outputs.k8s_latest }}
          wait: 180s
      - name: Load image into kind
        run: kind load docker-image jaas:smoke --name jaas-ha
      - name: Cluster prereqs (Flux + SeaweedFS)
        run: |
          hack/smoke/setup-flux.sh ${{ needs.discover.outputs.flux_latest }}
          hack/smoke/setup-seaweedfs.sh
      - name: Install released chart (2 replicas, SeaweedFS backend) with the dev image
        run: |
          kubectl create namespace jaas-system
          # Two operator pods (replicas.min=2); leader election gates which one
          # reconciles. Multi-replica HA needs shared storage: only the leader
          # writes tarballs while the storage Service reads from every replica, so
          # a local backend 404s from non-leaders and the chart's mode guard
          # rejects it. SeaweedFS gives every replica the same bucket.
          kubectl -n jaas-system create secret generic jaas-s3-creds \
            --from-literal=AWS_ACCESS_KEY_ID=jaas-smoke \
            --from-literal=AWS_SECRET_ACCESS_KEY=jaas-smoke-secret
          # The chart's JOI image-volumes need the ImageVolume feature gate kind
          # lacks, so disable them.
          helm upgrade --install jaas oci://ghcr.io/metio/helm-charts/jaas \
            --version "${{ needs.discover.outputs.chart_version }}" \
            --namespace jaas-system \
            --set image.registry=docker.io \
            --set image.repository=library/jaas \
            --set-string image.tag=smoke \
            --set operator.enabled=true \
            --set operator.defaultServiceAccount=default \
            --set libraries.grafonnet.enabled=false \
            --set libraries.docsonnet.enabled=false \
            --set libraries.xtd.enabled=false \
            --set operator.storage.backend=s3 \
            --set operator.storage.s3.endpoint=seaweedfs.seaweedfs.svc:8333 \
            --set operator.storage.s3.bucket=jaas-artifacts \
            --set operator.storage.s3.useSSL=false \
            --set operator.storage.s3.anonymous=false \
            --set operator.storage.s3.credentialsSecret.name=jaas-s3-creds \
            --set replicas.min=2 \
            --set replicas.max=2 \
            --wait --timeout 5m
          kubectl apply --server-side --force-conflicts -f config/crd/bases/
      - name: Operator scenario — leader failover
        run: hack/smoke/scenario-ha.sh
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n jaas-system get all || true
          kubectl -n jaas-system get lease || true
          kubectl -n jaas-system logs deploy/jaas --tail=300 --all-pods || true
          kubectl describe jsonnetsnippet ha-demo || true

  image-volume:
    name: OCI image-volume mount (k8s >= 1.33)
    needs: discover
    if: needs.discover.outputs.chart_version != '' && needs.discover.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Clone Git Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - id: gate
        name: Gate on k8s >= 1.33 (ImageVolume beta-on + containerd 2.x)
        run: |
          # The OCI image-volume mount the chart uses for library bundles needs
          # the ImageVolume feature gate, which is beta-on (and backed by
          # containerd 2.x in kindest/node) only from k8s 1.33. On older nodes the
          # pod wedges in ContainerCreating, so skip the install/assert there and
          # keep the job green — it's the version that's unsupported, not a bug.
          v="${{ needs.discover.outputs.k8s_latest }}"; v="${v#v}"
          minor="$(echo "$v" | cut -d. -f2)"
          if [ "$minor" -ge 33 ]; then
            echo "supported=true" >> "$GITHUB_OUTPUT"
            echo "k8s $v supports ImageVolume — running the mount assertion."
          else
            echo "supported=false" >> "$GITHUB_OUTPUT"
            echo "::notice::k8s $v < 1.33 has no ImageVolume support; image-volume job skips the install/assert (stays green)."
          fi
      - name: Build container image (dev / HEAD)
        if: steps.gate.outputs.supported == 'true'
        run: docker build --build-arg VERSION=smoke --build-arg COMMIT=${{ github.sha }} -t jaas:smoke .
      - name: Create kind cluster
        if: steps.gate.outputs.supported == 'true'
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          version: ${{ needs.discover.outputs.kind_latest }}
          cluster_name: jaas-imgvol
          node_image: kindest/node:${{ needs.discover.outputs.k8s_latest }}
          wait: 180s
      - name: Load image into kind
        if: steps.gate.outputs.supported == 'true'
        run: kind load docker-image jaas:smoke --name jaas-imgvol
      - name: Install released chart (renderer mode, real OCI image-volume) with the dev image
        if: steps.gate.outputs.supported == 'true'
        run: |
          kubectl create namespace jaas-system
          # Standalone HTTP-renderer mode (operator.enabled=false) with a real
          # additionalLibraries OCI mount — the volumes[].image other jobs DISABLE.
          # This is the sole job that exercises the image-volume runtime; helm
          # --wait gates on the pod becoming Ready, which only happens if the
          # kubelet mounted the OCI image.
          helm upgrade --install jaas oci://ghcr.io/metio/helm-charts/jaas \
            --version "${{ needs.discover.outputs.chart_version }}" \
            --namespace jaas-system \
            --set image.registry=docker.io \
            --set image.repository=library/jaas \
            --set-string image.tag=smoke \
            --set operator.enabled=false \
            --set additionalLibraries.xtd=ghcr.io/metio/joi-jsonnet-libs-xtd:latest \
            --wait --timeout 5m
      - name: Operator scenario — image-volume mount
        if: steps.gate.outputs.supported == 'true'
        run: hack/smoke/scenario-image-volume.sh
      - name: Diagnostics on failure
        if: failure() && steps.gate.outputs.supported == 'true'
        run: |
          kubectl -n jaas-system get all || true
          kubectl -n jaas-system describe pods -l app.kubernetes.io/name=jaas || true
          kubectl -n jaas-system logs deploy/jaas --tail=200 || true

  impersonation:
    name: tenant SA impersonation (RBACDenied → granted)
    needs: discover
    if: needs.discover.outputs.chart_version != '' && needs.discover.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Clone Git Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Build container image (dev / HEAD)
        run: docker build --build-arg VERSION=smoke --build-arg COMMIT=${{ github.sha }} -t jaas:smoke .
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          version: ${{ needs.discover.outputs.kind_latest }}
          cluster_name: jaas-imp
          node_image: kindest/node:${{ needs.discover.outputs.k8s_latest }}
          wait: 180s
      - name: Load image into kind
        run: kind load docker-image jaas:smoke --name jaas-imp
      - name: Cluster prereqs (Flux)
        run: hack/smoke/setup-flux.sh ${{ needs.discover.outputs.flux_latest }}
      - name: Install released chart (no webhook) with the dev image
        run: |
          kubectl create namespace jaas-system
          # The chart's default JOI library image-volumes (volumes[].image) need
          # the ImageVolume feature gate, which kind does not enable by default —
          # without it the pod wedges in ContainerCreating. These scenarios use
          # inline files / a Bucket source, not the libraries, so disable them.
          helm upgrade --install jaas oci://ghcr.io/metio/helm-charts/jaas \
            --version "${{ needs.discover.outputs.chart_version }}" \
            --namespace jaas-system \
            --set image.registry=docker.io \
            --set image.repository=library/jaas \
            --set-string image.tag=smoke \
            --set operator.enabled=true \
            --set operator.defaultServiceAccount=default \
            --set libraries.grafonnet.enabled=false \
            --set libraries.docsonnet.enabled=false \
            --set libraries.xtd.enabled=false \
            --wait --timeout 5m
          kubectl apply --server-side --force-conflicts -f config/crd/bases/
      - name: Operator scenario — tenant SA impersonation
        run: hack/smoke/scenario-impersonation.sh
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n jaas-system get all || true
          kubectl -n jaas-system logs deploy/jaas --tail=300 || true
          kubectl describe jsonnetsnippet imp-demo || true
          kubectl describe externalartifact imp-demo || true

  networkpolicy:
    name: chart NetworkPolicy applies + operator still works
    needs: discover
    if: needs.discover.outputs.chart_version != '' && needs.discover.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Clone Git Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Build container image (dev / HEAD)
        run: docker build --build-arg VERSION=smoke --build-arg COMMIT=${{ github.sha }} -t jaas:smoke .
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          version: ${{ needs.discover.outputs.kind_latest }}
          cluster_name: jaas-np
          node_image: kindest/node:${{ needs.discover.outputs.k8s_latest }}
          wait: 180s
      - name: Load image into kind
        run: kind load docker-image jaas:smoke --name jaas-np
      - name: Cluster prereqs (Flux)
        run: hack/smoke/setup-flux.sh ${{ needs.discover.outputs.flux_latest }}
      - name: Install released chart (no webhook, NetworkPolicy enabled) with the dev image
        run: |
          kubectl create namespace jaas-system
          # networkPolicy.enabled=true renders the chart's allowlist policy. kindnet
          # does not enforce it, so the scenario asserts the object lands and the
          # operator path still works — not enforcement. The chart's default JOI
          # library image-volumes (volumes[].image) need the ImageVolume feature
          # gate kind lacks, so disable them; these scenarios use inline files.
          helm upgrade --install jaas oci://ghcr.io/metio/helm-charts/jaas \
            --version "${{ needs.discover.outputs.chart_version }}" \
            --namespace jaas-system \
            --set image.registry=docker.io \
            --set image.repository=library/jaas \
            --set-string image.tag=smoke \
            --set operator.enabled=true \
            --set operator.defaultServiceAccount=default \
            --set libraries.grafonnet.enabled=false \
            --set libraries.docsonnet.enabled=false \
            --set libraries.xtd.enabled=false \
            --set networkPolicy.enabled=true \
            --wait --timeout 5m
          kubectl apply --server-side --force-conflicts -f config/crd/bases/
      - name: Operator scenario — NetworkPolicy applies + operator works
        run: hack/smoke/scenario-networkpolicy.sh
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n jaas-system get all || true
          kubectl -n jaas-system get networkpolicy jaas -o yaml || true
          kubectl -n jaas-system logs deploy/jaas --tail=300 || true
          kubectl describe jsonnetsnippet np-smoke || true
          kubectl describe externalartifact np-smoke || true

  # Real NetworkPolicy enforcement under a CNI that actually enforces (kindnet,
  # used by the `networkpolicy` job above, does not). Each chart engine is run on
  # the matching CNI: the kubernetes engine on Calico gets the full allow+deny
  # assertion (the storage-port allowlist scopes ingress to flux-system, so a
  # fetch from another namespace is genuinely dropped); the calico / cilium
  # engines render a pod-scoped allow-all on the required ports (no per-source
  # filter to deny), so they assert allow + operator-works under their native
  # dialect; the clusterNetworkPolicy engine (policy.networking.k8s.io/v1alpha2)
  # has no on-kind enforcer yet, so its CRDs are installed and the dialect is
  # validated at apply level. Cluster is created with no default CNI so the real
  # one can be installed (kind --wait 0s: nodes go Ready only after that).
  networkpolicy-enforcement:
    name: NetworkPolicy enforced (${{ matrix.cni }} / ${{ matrix.engine }})
    needs: discover
    if: needs.discover.outputs.chart_version != '' && needs.discover.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - cni: calico
            engine: kubernetes
            kindcfg: kind-calico.yaml
            enforce: "1"
          - cni: calico
            engine: calico
            kindcfg: kind-calico.yaml
            enforce: "0"
          - cni: cilium
            engine: cilium
            kindcfg: kind-cilium.yaml
            enforce: "0"
          - cni: calico
            engine: clusterNetworkPolicy
            kindcfg: kind-calico.yaml
            enforce: "0"
    steps:
      - name: Clone Git Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Build container image (dev / HEAD)
        run: docker build --build-arg VERSION=smoke --build-arg COMMIT=${{ github.sha }} -t jaas:smoke .
      - name: Create kind cluster (no default CNI)
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          version: ${{ needs.discover.outputs.kind_latest }}
          cluster_name: jaas-npe
          node_image: kindest/node:${{ needs.discover.outputs.k8s_latest }}
          config: hack/smoke/${{ matrix.kindcfg }}
          wait: "0s"
      - name: Install the enforcing CNI (${{ matrix.cni }})
        run: hack/smoke/setup-${{ matrix.cni }}.sh
      - name: Install the Network Policy API CRDs (clusterNetworkPolicy engine)
        if: matrix.engine == 'clusterNetworkPolicy'
        run: hack/smoke/setup-networkpolicy-api.sh
      - name: Load image into kind
        run: kind load docker-image jaas:smoke --name jaas-npe
      - name: Cluster prereqs (Flux)
        run: hack/smoke/setup-flux.sh ${{ needs.discover.outputs.flux_latest }}
      - name: Install released chart (NetworkPolicy enabled, engine=${{ matrix.engine }}) with the dev image
        run: |
          kubectl create namespace jaas-system
          helm upgrade --install jaas oci://ghcr.io/metio/helm-charts/jaas \
            --version "${{ needs.discover.outputs.chart_version }}" \
            --namespace jaas-system \
            --set image.registry=docker.io \
            --set image.repository=library/jaas \
            --set-string image.tag=smoke \
            --set operator.enabled=true \
            --set operator.defaultServiceAccount=default \
            --set libraries.grafonnet.enabled=false \
            --set libraries.docsonnet.enabled=false \
            --set libraries.xtd.enabled=false \
            --set networkPolicy.enabled=true \
            --set networkPolicy.engine=${{ matrix.engine }} \
            --wait --timeout 5m
          kubectl apply --server-side --force-conflicts -f config/crd/bases/
      - name: Operator scenario — NetworkPolicy enforcement
        run: ENFORCE=${{ matrix.enforce }} hack/smoke/scenario-networkpolicy-enforcement.sh
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n jaas-system get all || true
          kubectl get networkpolicies.networking.k8s.io -A -o wide || true
          kubectl get ciliumnetworkpolicies.cilium.io -A -o wide || true
          kubectl get networkpolicies.projectcalico.org -A -o wide || true
          kubectl get clusternetworkpolicies.policy.networking.k8s.io -A -o wide || true
          kubectl -n jaas-system logs deploy/jaas --tail=300 || true
          kubectl describe jsonnetsnippet np-enforce || true

  # Real service-mesh authorization enforcement. The chart's serviceMesh engine
  # renders the mesh's authz objects (Istio AuthorizationPolicy + optional
  # PeerAuthentication); this installs the mesh, injects the install + client
  # namespaces, scopes serviceMesh.storage.from to the allowed namespace, and
  # asserts a meshed client from there reaches the storage port while one from a
  # non-admitted namespace is rejected by the mesh (403 / reset). Needs no Flux:
  # the operator boots with its Flux watches gated, and the storage server still
  # answers (404), which is all the authz check needs. (Linkerd is a follow-up.)
  servicemesh:
    name: Service mesh authz enforced (${{ matrix.engine }})
    needs: discover
    if: needs.discover.outputs.chart_version != '' && needs.discover.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - engine: istio
            principal: cluster.local/ns/mesh-clients/sa/mesh-reader
          - engine: linkerd
            principal: mesh-reader.mesh-clients.serviceaccount.identity.linkerd.cluster.local
    steps:
      - name: Clone Git Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Build container image (dev / HEAD)
        run: docker build --build-arg VERSION=smoke --build-arg COMMIT=${{ github.sha }} -t jaas:smoke .
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          version: ${{ needs.discover.outputs.kind_latest }}
          cluster_name: jaas-mesh
          node_image: kindest/node:${{ needs.discover.outputs.k8s_latest }}
          wait: 120s
      - name: Load image into kind
        run: kind load docker-image jaas:smoke --name jaas-mesh
      - name: Install the service mesh (${{ matrix.engine }})
        run: hack/smoke/setup-${{ matrix.engine }}.sh
      - name: Create + mesh-inject the install and client namespaces
        run: |
          for ns in jaas-system mesh-clients; do
            kubectl create namespace "$ns"
            # Mark for injection in both meshes' idioms — each marker is inert
            # unless that mesh is installed, so the step stays engine-agnostic.
            kubectl label namespace "$ns" istio-injection=enabled
            kubectl annotate namespace "$ns" linkerd.io/inject=enabled
          done
          # The authorized client identity. The denied client reuses the
          # namespace default SA, so allow/deny turns on the ServiceAccount alone.
          kubectl -n mesh-clients create serviceaccount mesh-reader
      - name: Install released chart (serviceMesh enabled, engine=${{ matrix.engine }}) with the dev image
        run: |
          helm upgrade --install jaas oci://ghcr.io/metio/helm-charts/jaas \
            --version "${{ needs.discover.outputs.chart_version }}" \
            --namespace jaas-system \
            --set image.registry=docker.io \
            --set image.repository=library/jaas \
            --set-string image.tag=smoke \
            --set operator.enabled=true \
            --set operator.defaultServiceAccount=default \
            --set libraries.grafonnet.enabled=false \
            --set libraries.docsonnet.enabled=false \
            --set libraries.xtd.enabled=false \
            --set serviceMesh.enabled=true \
            --set serviceMesh.engine=${{ matrix.engine }} \
            --set serviceMesh.mtls=permissive \
            --set 'serviceMesh.storage.from[0].principals[0]=${{ matrix.principal }}' \
            --wait --timeout 5m
          kubectl apply --server-side --force-conflicts -f config/crd/bases/
      - name: Operator scenario — service-mesh authz enforcement (by SA identity)
        run: ENGINE=${{ matrix.engine }} hack/smoke/scenario-servicemesh.sh
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n jaas-system get all || true
          kubectl -n jaas-system get authorizationpolicies.security.istio.io,peerauthentications.security.istio.io -o yaml || true
          kubectl -n jaas-system get servers.policy.linkerd.io,authorizationpolicies.policy.linkerd.io -o yaml || true
          kubectl -n jaas-system logs deploy/jaas --all-containers=true --tail=200 || true
          kubectl -n mesh-clients logs deploy/mesh-deny --all-containers=true --tail=50 || true

  # Single stably-named aggregate — the only check to mark "required". It always
  # runs (if: always()) so it reports on every PR, including ones where the kind
  # jobs skip (not operator-relevant, or no released chart yet) — those pass.
  system-tests:
    name: System Tests
    needs:
      - discover
      - smoke
      - selfsigned
      - new-fields
      - source-chain
      - scale-smoke
      - s3-seaweedfs
      - ha
      - image-volume
      - impersonation
      - networkpolicy
      - networkpolicy-enforcement
      - servicemesh
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Fail unless every dependency succeeded or was skipped
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          echo "$NEEDS" | jq -r 'to_entries[] | "\(.key): \(.value.result)"'
          bad=$(echo "$NEEDS" | jq -r '
            to_entries[]
            | select(.value.result != "success" and .value.result != "skipped")
            | "\(.key)=\(.value.result)"')
          if [ -n "$bad" ]; then
            echo "::error::Required jobs did not pass:"; echo "$bad"; exit 1
          fi
          echo "All required jobs passed (or were intentionally skipped)."
