baseURL = "https://jaas.projects.metio.wtf/"
locale = "en"
defaultContentLanguage = "en"
theme = "metio"
title = "Jsonnet-as-a-Service"

enableGitInfo = true
enableRobotsTXT = true
enableInlineShortcodes = true
pygmentsUseClasses = true

# The mounted runbook directory carries a GitHub-facing README.md that is not a
# site page. ignoreFiles (a regex list, unlike the per-mount globs) drops it from
# the render while leaving it on disk for GitHub.
ignoreFiles = ['README\.md$']

# The migrated runbook pages contain inline HTML; Goldmark must pass it through
# rather than strip it.
[markup.goldmark.renderer]
  unsafe = true

[outputs]
  home = ["HTML", "RSS", "ATOM", "HUMANS", "FOAF", "LLMS", "LLMSINDEX"]
  section = ["HTML", "RSS", "ATOM"]
  term = ["HTML", "RSS", "ATOM"]

[params]
  mainSections = ["installation", "tutorials", "usage", "api", "comparisons", "runbooks", "contributing"]
  author = "metio.wtf"
  github = "metio/jaas"
  # Render the per-page "see history" / "edit this page" icons next to the title.
  # editContentPath is the repo-root-relative path to this content tree, joined
  # with each page's .File.Path to build the GitHub URLs.
  editContentPath = "docs/content"
  editBranch = "main"
  work = "jaas.projects.metio.wtf"
  description = "evaluate Jsonnet snippets on demand and return JSON"
  # Cross-project JSON-LD link (emitted as schema.org mentions on the home page).
  relatedProjects = [{ name = "stageset-controller", url = "https://stageset.projects.metio.wtf/" }]

