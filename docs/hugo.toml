# The website lives under docs/ but the runbook markdown is authored as plain repo
# documentation (GitHub-rendered, and pinned in place by the conditions_test drift
# gate at docs/runbooks/). Mounting that directory into the content tree publishes
# it on the site without relocating a single file, so the on-disk contract stays
# intact. Everything else is authored directly under content/.
[module]
  [[module.mounts]]
    source = "content"
    target = "content"

  [[module.mounts]]
    source = "runbooks"
    target = "content/runbooks"
